name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # Postgres 17 container — used for migration compatibility check only.
      # Playwright still runs against the real Supabase test database.
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      # Connection string for the postgres:17 service container
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Automation 1: Migration sync check ──────────────────────────────────
      # Queries the production Supabase DB for applied migrations and compares
      # against local .sql files. Warns (does not fail) if tracking table is
      # absent — this project applies migrations manually via the SQL editor.
      - name: Check migration sync with production Supabase
        run: node scripts/check-migrations.mjs

      # ── Automation 3: Postgres 17 compatibility check ────────────────────────
      # Runs every migration file against a stock postgres:17 container to catch
      # SQL syntax errors or type incompatibilities before they reach production.
      # session_replication_role=replica disables FK trigger checks so the
      # diagnostic seed INSERT in migration 008 succeeds on an empty DB.
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Verify Postgres 17 migration compatibility
        run: |
          psql "$DATABASE_URL" -f scripts/pg-compat-setup.sql
          for f in supabase/migrations/*.sql; do
            echo "Running $f..."
            psql "$DATABASE_URL" \
              -c "SET session_replication_role = replica;" \
              -f "$f" || exit 1
          done
          echo "All migrations ran cleanly on postgres:17."

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Next.js dev server
        run: npm run dev &
        env:
          PORT: 3000

      - name: Wait for dev server to be ready
        run: |
          echo "Waiting for Next.js to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is up!"
              exit 0
            fi
            echo "Attempt $i/30 — not ready yet, waiting 2s..."
            sleep 2
          done
          echo "Server did not start in time" && exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ── Automation 2: Production smoke test ─────────────────────────────────────
  # Runs after the E2E job completes on pushes to main only.
  # Looks up the sat-tutor-pro project ID from the Vercel API (no
  # VERCEL_PROJECT_ID secret required), waits for the deployment to reach READY,
  # then checks key endpoints for 500 errors.
  smoke-test:
    name: Production Smoke Test
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_APP_URL: https://sat-tutor-pro.vercel.app
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel deployment and run smoke tests
        run: node scripts/smoke-test.mjs
